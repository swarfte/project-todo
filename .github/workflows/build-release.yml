name: Build and Release Flutter App

on:
  push:
    branches:
      - main

  # 允許在 GitHub Actions 頁面手動執行。
  workflow_dispatch:

# 建立 Git tag、GitHub Release 和上傳 Release assets 所需的權限。
permissions:
  contents: write

# 避免同一分支同時執行多個發佈流程。
concurrency:
  group: flutter-release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: ProjectTodo

  # 必須與以下目錄內的主程式名稱一致：
  # build/windows/x64/runner/Release/
  APP_EXE_NAME: project_todo.exe

  # macOS DMG 安裝檔名稱。
  MACOS_DMG_NAME: ProjectTodo-macOS.dmg

jobs:
  # ============================================================
  # Version
  # 統一產生 Android、Windows、macOS 和 GitHub Release 使用的版本資料。
  # ============================================================
  prepare-version:
    name: Prepare Application Version
    runs-on: ubuntu-latest

    outputs:
      app-version: ${{ steps.version.outputs.app-version }}
      build-number: ${{ steps.version.outputs.build-number }}
      release-tag: ${{ steps.version.outputs.release-tag }}
      release-title: ${{ steps.version.outputs.release-title }}

    steps:
      - name: Generate application version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # 使用澳門時間產生日期版本。
          # 例如：2026.7.23
          APP_VERSION="$(TZ=Asia/Macau date '+%Y.%-m.%-d')"

          # Flutter build number / Android versionCode 必須是整數。
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          # run_attempt 用於防止重新執行同一個 workflow 時 tag 重複。
          # 例如：v2026.7.23-build.148-attempt.1
          RELEASE_TAG="v${APP_VERSION}-build.${BUILD_NUMBER}-attempt.${GITHUB_RUN_ATTEMPT}"

          RELEASE_TITLE="${APP_VERSION} (Build ${BUILD_NUMBER})"

          if [[ ! "$APP_VERSION" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}$ ]]; then
            echo "::error::產生的版本格式無效：$APP_VERSION"
            exit 1
          fi

          if [[ ! "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Build number 必須是整數：$BUILD_NUMBER"
            exit 1
          fi

          echo "app-version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build-number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "release-tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release-title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"

          echo "Application version: ${APP_VERSION}"
          echo "Build number: ${BUILD_NUMBER}"
          echo "Workflow attempt: ${GITHUB_RUN_ATTEMPT}"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release title: ${RELEASE_TITLE}"

  # ============================================================
  # Android
  # ============================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    needs:
      - prepare-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Show build information
        shell: bash
        run: |
          echo "Application version: ${{ needs.prepare-version.outputs.app-version }}"
          echo "Build number: ${{ needs.prepare-version.outputs.build-number }}"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      # 專案具備可正常執行的 tests 後，可取消下面兩行的註解。
      # - name: Run tests
      #   run: flutter test

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail

          flutter build apk \
            --release \
            --build-name="${{ needs.prepare-version.outputs.app-version }}" \
            --build-number="${{ needs.prepare-version.outputs.build-number }}"

      - name: Prepare Android release file
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_APK="build/app/outputs/flutter-apk/app-release.apk"
          TARGET_DIRECTORY="dist"
          TARGET_APK="${TARGET_DIRECTORY}/${APP_NAME}-Android.apk"

          if [ ! -f "$SOURCE_APK" ]; then
            echo "::error::找不到 Android APK：$SOURCE_APK"
            exit 1
          fi

          mkdir -p "$TARGET_DIRECTORY"
          cp "$SOURCE_APK" "$TARGET_APK"

          if [ ! -s "$TARGET_APK" ]; then
            echo "::error::Android APK 不存在或檔案大小為 0：$TARGET_APK"
            exit 1
          fi

          echo "Android APK 已準備完成："
          ls -lh "$TARGET_APK"

      # Artifact 用於將 APK 傳送到 create-release job。
      # 它不是最終的 GitHub Release。
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/${{ env.APP_NAME }}-Android.apk
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  # ============================================================
  # Windows
  # ============================================================
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    needs:
      - prepare-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Show build information
        shell: pwsh
        run: |
          Write-Host "Application version: ${{ needs.prepare-version.outputs.app-version }}"
          Write-Host "Build number: ${{ needs.prepare-version.outputs.build-number }}"

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      # 專案具備可正常執行的 tests 後，可取消下面兩行的註解。
      # - name: Run tests
      #   run: flutter test

      - name: Build Windows release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          flutter build windows `
            --release `
            --build-name="${{ needs.prepare-version.outputs.app-version }}" `
            --build-number="${{ needs.prepare-version.outputs.build-number }}"

          if ($LASTEXITCODE -ne 0) {
            throw "Flutter Windows build 失敗，退出碼：$LASTEXITCODE"
          }

      - name: Verify Windows executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildDirectory = Join-Path `
            $env:GITHUB_WORKSPACE `
            "build\windows\x64\runner\Release"

          $exePath = Join-Path `
            $buildDirectory `
            "${{ env.APP_EXE_NAME }}"

          Write-Host "Windows build directory: $buildDirectory"
          Write-Host "Expected executable: $exePath"

          if (-not (Test-Path -LiteralPath $buildDirectory)) {
            throw "找不到 Windows build 目錄：$buildDirectory"
          }

          Write-Host "Windows build 目錄內容："

          Get-ChildItem `
            -LiteralPath $buildDirectory `
            -Recurse |
            Select-Object FullName, Length

          if (-not (Test-Path -LiteralPath $exePath)) {
            throw "找不到 Windows 主程式：$exePath"
          }

          $exeFile = Get-Item -LiteralPath $exePath

          if ($exeFile.Length -le 0) {
            throw "Windows 主程式檔案大小為 0：$exePath"
          }

          Write-Host "找到 Windows 主程式：$exePath"
          Write-Host "檔案大小：$($exeFile.Length) bytes"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          choco install innosetup --yes --no-progress

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup 安裝失敗，退出碼：$LASTEXITCODE"
          }

      - name: Locate Inno Setup compiler
        id: inno
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $possiblePaths = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )

          $iscc = $possiblePaths |
            Where-Object {
              Test-Path -LiteralPath $_
            } |
            Select-Object -First 1

          if (-not $iscc) {
            Write-Host "已檢查以下位置："

            foreach ($path in $possiblePaths) {
              Write-Host "  $path"
            }

            throw "找不到 Inno Setup Compiler：ISCC.exe"
          }

          "path=$iscc" >> $env:GITHUB_OUTPUT

          Write-Host "Inno Setup Compiler：$iscc"

      - name: Build Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $iscc = "${{ steps.inno.outputs.path }}"

          $buildDirectory = Join-Path `
            $env:GITHUB_WORKSPACE `
            "build\windows\x64\runner\Release"

          $distDirectory = Join-Path `
            $env:GITHUB_WORKSPACE `
            "dist"

          $installerScript = Join-Path `
            $env:GITHUB_WORKSPACE `
            "windows\installer.iss"

          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "找不到 Inno Setup Compiler：$iscc"
          }

          if (-not (Test-Path -LiteralPath $buildDirectory)) {
            throw "找不到 Windows build 目錄：$buildDirectory"
          }

          if (-not (Test-Path -LiteralPath $installerScript)) {
            throw "找不到 Inno Setup 設定檔：$installerScript"
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $distDirectory |
            Out-Null

          Write-Host "開始建立 Windows 安裝程式"
          Write-Host "App name：${{ env.APP_NAME }}"
          Write-Host "EXE name：${{ env.APP_EXE_NAME }}"
          Write-Host "Version：${{ needs.prepare-version.outputs.app-version }}"
          Write-Host "Build number：${{ needs.prepare-version.outputs.build-number }}"
          Write-Host "Build directory：$buildDirectory"
          Write-Host "Output directory：$distDirectory"
          Write-Host "Installer script：$installerScript"

          $arguments = @(
            "/DMyAppName=${{ env.APP_NAME }}"
            "/DMyAppExeName=${{ env.APP_EXE_NAME }}"
            "/DMyAppVersion=${{ needs.prepare-version.outputs.app-version }}"
            "/DMyAppBuildNumber=${{ needs.prepare-version.outputs.build-number }}"
            "/DBuildDir=$buildDirectory"
            "/DOutputDir=$distDirectory"
            $installerScript
          )

          & $iscc @arguments

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup 建立安裝程式失敗，退出碼：$LASTEXITCODE"
          }

      - name: Verify Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $distDirectory = Join-Path `
            $env:GITHUB_WORKSPACE `
            "dist"

          $installerPath = Join-Path `
            $distDirectory `
            "${{ env.APP_NAME }}-Windows-Setup.exe"

          if (-not (Test-Path -LiteralPath $distDirectory)) {
            throw "找不到 dist 目錄：$distDirectory"
          }

          Write-Host "dist 目錄內容："

          Get-ChildItem `
            -LiteralPath $distDirectory `
            -Recurse |
            Select-Object FullName, Length

          if (-not (Test-Path -LiteralPath $installerPath)) {
            throw "找不到 Windows 安裝程式：$installerPath"
          }

          $installer = Get-Item -LiteralPath $installerPath

          if ($installer.Length -le 0) {
            throw "Windows 安裝程式檔案大小為 0：$installerPath"
          }

          Write-Host "Windows 安裝程式建立成功"
          Write-Host "檔案：$($installer.FullName)"
          Write-Host "大小：$($installer.Length) bytes"

      # Artifact 用於將 Windows installer 傳送到 create-release job。
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/${{ env.APP_NAME }}-Windows-Setup.exe
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  # ============================================================
  # macOS
  # 僅支援 Apple Silicon，即 M1 或更新機型。
  # 建立包含 .app 和 Applications 捷徑的 DMG。
  # ============================================================
  build-macos:
    name: Build macOS DMG
    runs-on: macos-15

    needs:
      - prepare-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show build environment
        shell: bash
        run: |
          set -euo pipefail

          flutter --version
          xcodebuild -version
          sw_vers

          echo "Runner CPU architecture：$(uname -m)"

          if [ "$(uname -m)" != "arm64" ]; then
            echo "::error::目前 runner 不是 Apple Silicon ARM64 runner。"
            exit 1
          fi

      - name: Show build information
        shell: bash
        run: |
          echo "Application version: ${{ needs.prepare-version.outputs.app-version }}"
          echo "Build number: ${{ needs.prepare-version.outputs.build-number }}"

      - name: Enable macOS desktop
        shell: bash
        run: |
          set -euo pipefail
          flutter config --enable-macos-desktop

      - name: Verify macOS project
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "macos" ]; then
            echo "::error::找不到 macos 目錄。請先在本機執行：flutter create --platforms=macos ."
            exit 1
          fi

          if [ ! -f "macos/Runner.xcworkspace/contents.xcworkspacedata" ]; then
            echo "::error::找不到 macos/Runner.xcworkspace"
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get

      - name: Analyze project
        shell: bash
        run: |
          set -euo pipefail
          flutter analyze

      # 專案具備可正常執行的 tests 後，可取消下面兩行的註解。
      # - name: Run tests
      #   run: flutter test

      - name: Build macOS release
        shell: bash
        run: |
          set -euo pipefail

          flutter build macos \
            --release \
            --build-name="${{ needs.prepare-version.outputs.app-version }}" \
            --build-number="${{ needs.prepare-version.outputs.build-number }}"

      - name: Locate and verify macOS application
        id: macos-app
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIRECTORY="build/macos/Build/Products/Release"

          if [ ! -d "$BUILD_DIRECTORY" ]; then
            echo "::error::找不到 macOS build 目錄：$BUILD_DIRECTORY"
            exit 1
          fi

          echo "macOS build 目錄內容："
          find "$BUILD_DIRECTORY" -maxdepth 2 -print

          APP_COUNT="$(
            find "$BUILD_DIRECTORY" \
              -maxdepth 1 \
              -type d \
              -name '*.app' |
            wc -l |
            tr -d ' '
          )"

          if [ "$APP_COUNT" -eq 0 ]; then
            echo "::error::找不到 macOS .app bundle"
            exit 1
          fi

          if [ "$APP_COUNT" -gt 1 ]; then
            echo "::error::找到多個 macOS .app bundle，無法確定要發佈哪一個："

            find "$BUILD_DIRECTORY" \
              -maxdepth 1 \
              -type d \
              -name '*.app' \
              -print

            exit 1
          fi

          APP_PATH="$(
            find "$BUILD_DIRECTORY" \
              -maxdepth 1 \
              -type d \
              -name '*.app' \
              -print |
            head -n 1
          )"

          APP_BUNDLE_NAME="$(basename "$APP_PATH")"
          APP_DISPLAY_NAME="${APP_BUNDLE_NAME%.app}"
          INFO_PLIST="${APP_PATH}/Contents/Info.plist"

          if [ ! -f "$INFO_PLIST" ]; then
            echo "::error::找不到 Info.plist：$INFO_PLIST"
            exit 1
          fi

          EXECUTABLE_NAME="$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleExecutable' \
              "$INFO_PLIST"
          )"

          EXECUTABLE_PATH="${APP_PATH}/Contents/MacOS/${EXECUTABLE_NAME}"

          if [ ! -f "$EXECUTABLE_PATH" ]; then
            echo "::error::找不到 macOS 主程式：$EXECUTABLE_PATH"
            exit 1
          fi

          if [ ! -s "$EXECUTABLE_PATH" ]; then
            echo "::error::macOS 主程式檔案大小為 0：$EXECUTABLE_PATH"
            exit 1
          fi

          echo "找到 macOS app：$APP_PATH"
          echo "Bundle name：$APP_BUNDLE_NAME"
          echo "Executable：$EXECUTABLE_PATH"

          EXECUTABLE_ARCHITECTURES="$(lipo -archs "$EXECUTABLE_PATH")"

          echo "主程式架構：$EXECUTABLE_ARCHITECTURES"

          if ! echo "$EXECUTABLE_ARCHITECTURES" |
            tr ' ' '\n' |
            grep -Fx "arm64"
          then
            echo "::error::macOS 主程式不包含 Apple Silicon arm64 架構。"
            exit 1
          fi

          echo "驗證 app bundle 程式碼簽署結構："

          codesign --verify \
            --deep \
            --strict \
            --verbose=2 \
            "$APP_PATH"

          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "app-bundle-name=$APP_BUNDLE_NAME" >> "$GITHUB_OUTPUT"
          echo "app-display-name=$APP_DISPLAY_NAME" >> "$GITHUB_OUTPUT"

      - name: Create macOS DMG
        shell: bash
        env:
          APP_PATH: ${{ steps.macos-app.outputs.app-path }}
          APP_BUNDLE_NAME: ${{ steps.macos-app.outputs.app-bundle-name }}
          APP_DISPLAY_NAME: ${{ steps.macos-app.outputs.app-display-name }}
          APP_VERSION: ${{ needs.prepare-version.outputs.app-version }}
        run: |
          set -euo pipefail

          DIST_DIRECTORY="$GITHUB_WORKSPACE/dist"
          DMG_STAGE_DIRECTORY="$RUNNER_TEMP/dmg-stage"
          DMG_PATH="${DIST_DIRECTORY}/${MACOS_DMG_NAME}"
          VOLUME_NAME="${APP_DISPLAY_NAME} ${APP_VERSION}"

          rm -rf "$DMG_STAGE_DIRECTORY"
          mkdir -p "$DMG_STAGE_DIRECTORY"
          mkdir -p "$DIST_DIRECTORY"

          echo "複製 macOS app bundle："
          echo "Source：$APP_PATH"
          echo "Target：${DMG_STAGE_DIRECTORY}/${APP_BUNDLE_NAME}"

          # ditto 用於保留 macOS app bundle 的 metadata、權限和符號連結。
          ditto \
            "$APP_PATH" \
            "${DMG_STAGE_DIRECTORY}/${APP_BUNDLE_NAME}"

          # 使用者打開 DMG 後，可將 app 拖放到 Applications。
          ln -s \
            /Applications \
            "${DMG_STAGE_DIRECTORY}/Applications"

          echo "DMG staging 目錄內容："
          ls -la "$DMG_STAGE_DIRECTORY"

          rm -f "$DMG_PATH"

          hdiutil create \
            -volname "$VOLUME_NAME" \
            -srcfolder "$DMG_STAGE_DIRECTORY" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          if [ ! -s "$DMG_PATH" ]; then
            echo "::error::macOS DMG 不存在或檔案大小為 0：$DMG_PATH"
            exit 1
          fi

          echo "macOS DMG 建立成功："
          ls -lh "$DMG_PATH"

      - name: Verify macOS DMG
        shell: bash
        run: |
          set -euo pipefail

          DMG_PATH="dist/${MACOS_DMG_NAME}"
          MOUNT_DIRECTORY="$RUNNER_TEMP/dmg-verify"

          if [ ! -s "$DMG_PATH" ]; then
            echo "::error::找不到 macOS DMG 或檔案大小為 0：$DMG_PATH"
            exit 1
          fi

          echo "驗證 DMG 檔案完整性："
          hdiutil verify "$DMG_PATH"

          rm -rf "$MOUNT_DIRECTORY"
          mkdir -p "$MOUNT_DIRECTORY"

          cleanup() {
            if mount | grep -Fq "$MOUNT_DIRECTORY"; then
              hdiutil detach "$MOUNT_DIRECTORY" -force >/dev/null 2>&1 || true
            fi
          }

          trap cleanup EXIT

          hdiutil attach \
            "$DMG_PATH" \
            -nobrowse \
            -readonly \
            -mountpoint "$MOUNT_DIRECTORY"

          echo "已掛載 DMG 內容："
          find "$MOUNT_DIRECTORY" -maxdepth 2 -print

          APP_COUNT="$(
            find "$MOUNT_DIRECTORY" \
              -maxdepth 1 \
              -type d \
              -name '*.app' |
            wc -l |
            tr -d ' '
          )"

          if [ "$APP_COUNT" -ne 1 ]; then
            echo "::error::DMG 內應包含一個 .app，實際找到：$APP_COUNT"
            exit 1
          fi

          if [ ! -L "$MOUNT_DIRECTORY/Applications" ]; then
            echo "::error::DMG 內缺少 Applications 捷徑"
            exit 1
          fi

          APPLICATIONS_TARGET="$(
            readlink "$MOUNT_DIRECTORY/Applications"
          )"

          if [ "$APPLICATIONS_TARGET" != "/Applications" ]; then
            echo "::error::Applications 捷徑指向錯誤：$APPLICATIONS_TARGET"
            exit 1
          fi

          echo "macOS DMG 驗證成功。"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/${{ env.MACOS_DMG_NAME }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  # ============================================================
  # GitHub Release
  # Android、Windows 和 macOS 都成功後才執行。
  # ============================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    needs:
      - prepare-version
      - build-android
      - build-windows
      - build-macos

    permissions:
      contents: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-files/android

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-files/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-files/macos

      - name: Verify release files
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="release-files/android/${APP_NAME}-Android.apk"
          WINDOWS_FILE="release-files/windows/${APP_NAME}-Windows-Setup.exe"
          MACOS_FILE="release-files/macos/${MACOS_DMG_NAME}"

          echo "已下載的 release 檔案："
          find release-files -maxdepth 3 -type f -print

          if [ ! -f "$APK_FILE" ]; then
            echo "::error::找不到 Android APK：$APK_FILE"
            exit 1
          fi

          if [ ! -s "$APK_FILE" ]; then
            echo "::error::Android APK 檔案大小為 0：$APK_FILE"
            exit 1
          fi

          if [ ! -f "$WINDOWS_FILE" ]; then
            echo "::error::找不到 Windows installer：$WINDOWS_FILE"
            exit 1
          fi

          if [ ! -s "$WINDOWS_FILE" ]; then
            echo "::error::Windows installer 檔案大小為 0：$WINDOWS_FILE"
            exit 1
          fi

          if [ ! -f "$MACOS_FILE" ]; then
            echo "::error::找不到 macOS DMG：$MACOS_FILE"
            exit 1
          fi

          if [ ! -s "$MACOS_FILE" ]; then
            echo "::error::macOS DMG 檔案大小為 0：$MACOS_FILE"
            exit 1
          fi

          echo "準備發佈以下檔案："

          ls -lh \
            "$APK_FILE" \
            "$WINDOWS_FILE" \
            "$MACOS_FILE"

      - name: Show release information
        shell: bash
        run: |
          echo "Application version: ${{ needs.prepare-version.outputs.app-version }}"
          echo "Build number: ${{ needs.prepare-version.outputs.build-number }}"
          echo "Release tag: ${{ needs.prepare-version.outputs.release-tag }}"
          echo "Release title: ${{ needs.prepare-version.outputs.release-title }}"

      - name: Create GitHub Release and upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ needs.prepare-version.outputs.app-version }}
          BUILD_NUMBER: ${{ needs.prepare-version.outputs.build-number }}
          RELEASE_TAG: ${{ needs.prepare-version.outputs.release-tag }}
          RELEASE_TITLE: ${{ needs.prepare-version.outputs.release-title }}
        run: |
          set -euo pipefail

          APK_FILE="release-files/android/${APP_NAME}-Android.apk"
          WINDOWS_FILE="release-files/windows/${APP_NAME}-Windows-Setup.exe"
          MACOS_FILE="release-files/macos/${MACOS_DMG_NAME}"

          echo "正在建立 GitHub Release：$RELEASE_TAG"

          gh release create "$RELEASE_TAG" \
            "$APK_FILE#${APP_NAME} Android APK" \
            "$WINDOWS_FILE#${APP_NAME} Windows Installer" \
            "$MACOS_FILE#${APP_NAME} macOS Apple Silicon DMG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --generate-notes \
            --latest

          echo "GitHub Release 建立成功。"

      - name: Verify published GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-version.outputs.release-tag }}
        run: |
          set -euo pipefail

          echo "檢查已建立的 Release："

          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY"

          echo "檢查 Release assets："

          ASSET_NAMES="$(
            gh release view "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name'
          )"

          echo "$ASSET_NAMES"

          echo "$ASSET_NAMES" |
            grep -Fx "${APP_NAME}-Android.apk"

          echo "$ASSET_NAMES" |
            grep -Fx "${APP_NAME}-Windows-Setup.exe"

          echo "$ASSET_NAMES" |
            grep -Fx "${MACOS_DMG_NAME}"

          echo "Android、Windows 和 macOS 安裝檔均已成功加入 GitHub Release。"
