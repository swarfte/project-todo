name: Build and Release Flutter App

on:
  push:
    branches:
      - main

  # 方便在 GitHub Actions 頁面手動執行
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: ProjectTodo

  # 必須與 build/windows/x64/runner/Release 內的主程式名稱一致
  APP_EXE_NAME: project_todo.exe

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/${APP_NAME}-Android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/${{ env.APP_NAME }}-Android.apk
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Verify Windows executable
        shell: pwsh
        run: |
          $exePath = "build/windows/x64/runner/Release/${{ env.APP_EXE_NAME }}"

          if (-not (Test-Path $exePath)) {
            Write-Host "找不到 Windows 主程式：$exePath"
            Write-Host "Release 目錄內容："
            Get-ChildItem "build/windows/x64/runner/Release" -Recurse
            exit 1
          }

          Write-Host "找到 Windows 主程式：$exePath"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Read app version
        id: app-version
        shell: pwsh
        run: |
          $versionLine = Get-Content pubspec.yaml |
            Where-Object { $_ -match '^version:\s*' } |
            Select-Object -First 1

          if (-not $versionLine) {
            throw "未能從 pubspec.yaml 找到 version"
          }

          $fullVersion = ($versionLine -replace '^version:\s*', '').Trim()
          $version = ($fullVersion -split '\+')[0]

          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "App version: $version"

      - name: Build Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"

          if (-not (Test-Path $iscc)) {
            throw "找不到 Inno Setup Compiler：$iscc"
          }

          & $iscc `
            "/DMyAppName=${{ env.APP_NAME }}" `
            "/DMyAppExeName=${{ env.APP_EXE_NAME }}" `
            "/DMyAppVersion=${{ steps.app-version.outputs.version }}" `
            "/DBuildDir=$env:GITHUB_WORKSPACE\build\windows\x64\runner\Release" `
            "/DOutputDir=$env:GITHUB_WORKSPACE\dist" `
            "$env:GITHUB_WORKSPACE\windows\installer.iss"

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup 建立安裝程式失敗"
          }

      - name: Verify installer
        shell: pwsh
        run: |
          Get-ChildItem dist

          $installer = "dist/${{ env.APP_NAME }}-Windows-Setup.exe"

          if (-not (Test-Path $installer)) {
            throw "找不到 Windows 安裝程式：$installer"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/${{ env.APP_NAME }}-Windows-Setup.exe
          if-no-files-found: error
          retention-days: 7

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    needs:
      - build-android
      - build-windows

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-files

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-files

      - name: List release files
        run: find release-files -maxdepth 2 -type f -print

      - name: Generate release timestamp
        id: release-info
        shell: bash
        run: |
          RELEASE_TAG="$(TZ=Asia/Macau date '+%Y-%m-%d-%H-%M-%S')"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${RELEASE_TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-info.outputs.tag }}
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" \
            release-files/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes